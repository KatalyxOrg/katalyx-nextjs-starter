name: katalyx-nextjs-starter

services:
  db:
    image: postgres:15-alpine
    container_name: katalyx-nextjs-starter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: katalyx-nextjs-starter-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: katalyx-nextjs-starter
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@db:5432/app}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-zbMtLWV64HebMX2ufKxuKwHVepUUDLJSL8HQQH/hs2A=}

volumes:
  postgres_data:
  pgadmin_data:
